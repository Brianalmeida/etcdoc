apiVersion: v1
kind: ServiceAccount
metadata:
  name: etcdoc
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: etcdoc-leader-election
  namespace: kube-system
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "watch", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: etcdoc-leader-election
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: etcdoc-leader-election
subjects:
- kind: ServiceAccount
  name: etcdoc
  namespace: kube-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: etcdoc-config
  namespace: kube-system
data:
  config.yaml: |
    etcd:
      metrics_url: "http://127.0.0.1:2381/metrics"
      cert_file: "/etc/etcd/server-client.crt"
      key_file: "/etc/etcd/server-client.key"
      ca_file: "/etc/etcd/server-ca.crt"
    thresholds:
      fsync_latency_seconds: 0.5
      backend_commit_latency_seconds: 1.0
      max_leader_changes_5m: 3
      max_pending_proposals: 100
      max_db_size_bytes: 8589934592
    logging:
      level: "info"
      format: "json"
    observability:
      enabled: true
      metrics_port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: etcdoc
  namespace: kube-system
  labels:
    app: etcdoc
spec:
  selector:
    app: etcdoc
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: etcdoc
  namespace: kube-system
  labels:
    app: etcdoc
    release: rancher-monitoring
spec:
  selector:
    matchLabels:
      app: etcdoc
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: etcdoc
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: etcdoc
  template:
    metadata:
      labels:
        app: etcdoc
    spec:
      hostNetwork: true
      serviceAccountName: etcdoc
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: etcdoc
        image: ttl.sh/etcdoc-testing-brian:4h
        imagePullPolicy: IfNotPresent
        args: ["-config", "/etc/tool/config.yaml"]
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: false
          runAsUser: 0
          allowPrivilegeEscalation: true
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: config
          mountPath: /etc/tool
          readOnly: true
        - name: etcd-certs
          mountPath: /etc/etcd
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: etcdoc-config
      - name: etcd-certs
        hostPath:
          path: /var/lib/rancher/rke2/server/tls/etcd/
          type: Directory